name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  POSTGRES_USER: retailflow_user
  POSTGRES_PASSWORD: retailflow_pass
  POSTGRES_DB: retailflow
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Core Python — lint, format check, unit tests
  # ──────────────────────────────────────────────────────────────────────
  core-python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: retailflow_user
          POSTGRES_PASSWORD: retailflow_pass
          POSTGRES_DB: retailflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 scripts/ tests/ --max-line-length=100 --ignore=E203,E501,W503

      - name: Check formatting with black
        run: |
          black --check scripts/ tests/

      - name: Run pytest (core)
        run: |
          python -m pytest tests/ -v --tb=short --ignore=tests/test_excel_export.py
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

  # ──────────────────────────────────────────────────────────────────────
  # dbt — SQL compilation & connection validation
  # ──────────────────────────────────────────────────────────────────────
  dbt-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: retailflow_user
          POSTGRES_PASSWORD: retailflow_pass
          POSTGRES_DB: retailflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: dbt

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.7.14 dbt-postgres==1.7.14

      - name: Create raw & snapshots schemas
        run: |
          psql -h ${{ env.POSTGRES_HOST }} -p ${{ env.POSTGRES_PORT }} -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -c "CREATE SCHEMA IF NOT EXISTS raw; CREATE SCHEMA IF NOT EXISTS snapshots;"
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: dbt debug
        run: dbt debug
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

      - name: dbt deps (install packages)
        run: dbt deps
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

      - name: dbt parse (SQL compilation)
        run: dbt parse
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
