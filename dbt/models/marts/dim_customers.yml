version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension table. One row per customer with demographic
      details and pre-computed aggregate metrics (total orders, lifetime value).

    columns:
      - name: customer_id
        description: Unique customer identifier (UUID). Primary key.
        tests:
          - unique
          - not_null

      - name: first_name
        description: Customer's first name.
        tests:
          - not_null

      - name: last_name
        description: Customer's last name.
        tests:
          - not_null

      - name: email
        description: Customer email address.
        tests:
          - unique
          - not_null

      - name: country
        description: Customer's country.

      - name: city
        description: Customer's city.

      - name: signup_date
        description: Customer signup date.

      - name: age
        description: Customer age in years.

      - name: gender
        description: Customer gender.

      - name: total_orders
        description: Total number of orders placed by this customer.

      - name: lifetime_value_cents
        description: Total revenue generated by this customer in cents.
