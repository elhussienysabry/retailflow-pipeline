# =============================================================================
# RetailFlow Pipeline — CI/CD Workflow
# =============================================================================
# Runs on every push / pull-request to main/master.
#
# Jobs:
#   1. core-python   — Install main deps, lint (flake8, black check), run pytest
#   2. dbt-validation — Isolate dbt-core, compile + parse all models, run debug
#
# A temporary PostgreSQL service container is available to both jobs so that
# tests / dbt commands that require a live database can run safely.
# =============================================================================

name: RetailFlow CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: retailflow
  POSTGRES_USER: retailflow_user
  POSTGRES_PASSWORD: retailflow_pass

jobs:

  # --------------------------------------------------------------------------
  # Job 1 — Core Python: lint, format-check, and run the pytest suite
  # --------------------------------------------------------------------------
  core-python:
    name: Core Python – Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install main dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 scripts/ src/ tests/ \
            --count --show-source --statistics \
            --max-line-length=100 \
            --ignore=E501,W503

      - name: Check formatting with black
        run: black --check scripts/ src/ tests/
        continue-on-error: true

      - name: Run pytest suite
        run: python -m pytest tests/ -v --tb=short
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: retailflow
          POSTGRES_USER: retailflow_user
          POSTGRES_PASSWORD: retailflow_pass

  # --------------------------------------------------------------------------
  # Job 2 — dbt Validation: install dbt-core + dbt-postgres, parse all models
  # --------------------------------------------------------------------------
  dbt-validation:
    name: dbt – Parse & Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dbt-core & dbt-postgres only
        run: pip install dbt-core==1.7.14 dbt-postgres==1.7.14

      - name: Create raw schema (dbt source tables)
        run: |
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} \
          psql -h ${{ env.POSTGRES_HOST }} \
               -U ${{ env.POSTGRES_USER }} \
               -d ${{ env.POSTGRES_DB }} \
               -c "CREATE SCHEMA IF NOT EXISTS raw;"
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: dbt debug (connection test)
        working-directory: dbt
        run: dbt debug
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: retailflow
          POSTGRES_USER: retailflow_user
          POSTGRES_PASSWORD: retailflow_pass

      - name: dbt parse (syntax & compilation check)
        working-directory: dbt
        run: dbt parse
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: retailflow
          POSTGRES_USER: retailflow_user
          POSTGRES_PASSWORD: retailflow_pass
