# =============================================================================
# RetailFlow Pipeline — dbt Project Configuration
# =============================================================================
# This file tells dbt about the project structure, which database to connect
# to, and where to find models, tests, and macros.
# =============================================================================

name: "retailflow"
version: "1.0.0"
config-version: 2

profile: "retailflow"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

models:
  retailflow:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
