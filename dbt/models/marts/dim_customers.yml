version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension table with SCD Type 2 history. One row per
      version of each customer, tracked by `customer_key` (surrogate).
      Use `is_current` (WHERE is_current = TRUE) for the latest view.

    columns:
      - name: customer_key
        description: >
          Surrogate key generated from `dbt_utils.generate_surrogate_key(email, dbt_valid_from)`.
          Stable across pipeline runs. Primary key for the dimension.
        tests:
          - unique
          - not_null

      - name: customer_id
        description: Business-level customer identifier (UUID). Not unique in this table
          (multiple rows per customer across SCD versions).
        tests:
          - not_null

      - name: first_name
        description: Customer's first name.
        tests:
          - not_null

      - name: last_name
        description: Customer's last name.
        tests:
          - not_null

      - name: email
        description: Customer email address. Used as the SCD natural key.
          Not unique in this table (multiple rows per email across SCD versions).
        tests:
          - not_null

      - name: country
        description: Customer's country.

      - name: city
        description: Customer's city.

      - name: signup_date
        description: Customer signup date.

      - name: age
        description: Customer age in years.

      - name: gender
        description: Customer gender.

      - name: dbt_valid_from
        description: Timestamp when this SCD version became active.

      - name: dbt_valid_to
        description: Timestamp when this SCD version was superseded. NULL for current version.

      - name: is_current
        description: >
          Boolean flag. TRUE for the current/latest version of each customer.
          Use `WHERE is_current` to get the classic 1-row-per-customer view.

      - name: total_orders
        description: Total number of orders placed by this customer.

      - name: lifetime_value_cents
        description: Total revenue generated by this customer in cents.
